name: CI (Tests and Lint)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: go test
        run: go test --timeout=20m ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.1.0
